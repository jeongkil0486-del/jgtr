<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 정길이 인생역전 가즈아</title>
    <!-- 트레이딩뷰 라이브러리 -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151d30;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --blue: #0ea5e9;
            --green: #10b981;
            --red: #f43f5e;
            --purple: #a855f7;
            --orange: #f59e0b;
            --border: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
        }
        h2 { text-align: center; color: #fff; margin-bottom: 5px; font-size: 22px; letter-spacing: -1px; }
        .subtitle { text-align: center; color: var(--text-sub); font-size: 12px; margin-bottom: 15px; }
        
        .noti-btn {
            background: linear-gradient(135deg, #f43f5e, #a855f7);
            color: white; border: none; padding: 12px; border-radius: 8px;
            width: 100%; font-weight: bold; font-size: 14px; cursor: pointer;
            margin-bottom: 20px; box-shadow: 0 4px 10px rgba(244,63,94,0.3);
        }

        .section-title { font-size: 15px; font-weight: bold; margin: 20px 0 10px 0; color: #e2e8f0; border-left: 4px solid var(--purple); padding-left: 8px; }
        .sc-scalping { border-left-color: var(--orange) !important; color: #fcd34d !important; }

        .card {
            background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px;
            border: 1px solid var(--border); transition: all 0.5s ease;
        }
        
        .glow-scalping-card {
            border: 1px solid var(--orange) !important;
            animation: scalpingGlow 1.2s infinite alternate;
            background: linear-gradient(180deg, #151d30 0%, #241a08 100%);
        }
        @keyframes scalpingGlow {
            0% { box-shadow: 0 0 5px rgba(245, 158, 11, 0.3); }
            100% { box-shadow: 0 0 18px rgba(245, 158, 11, 0.8); }
        }

        .glow-buy-card {
            border: 1px solid var(--blue) !important;
            animation: neonGlow 1.2s infinite alternate;
            background: linear-gradient(180deg, #151d30 0%, #0c2340 100%);
        }
        @keyframes neonGlow {
            0% { box-shadow: 0 0 5px rgba(14, 165, 233, 0.4); }
            100% { box-shadow: 0 0 20px rgba(14, 165, 233, 0.9); }
        }
        
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
        select, input {
            width: 100%; padding: 10px; background-color: #0b0f19;
            border: 1px solid var(--border); border-radius: 6px; color: #fff;
            font-size: 15px; box-sizing: border-box;
        }
        .main-btn {
            width: 100%; padding: 12px; background: linear-gradient(135deg, var(--blue), var(--purple));
            color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer;
        }

        .flex { display: flex; justify-content: space-between; align-items: center; }
        .coin-title { font-size: 17px; font-weight: bold; margin: 0; cursor: pointer; color: var(--blue); text-decoration: underline; }
        
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; color: #fff; }
        .bg-buy { background-color: var(--blue); }
        .bg-sell { background-color: var(--green); }
        .bg-stop { background-color: var(--red); }
        .bg-hold { background-color: #475569; }
        .bg-orange { background-color: var(--orange); }

        .price-info { font-size: 14px; margin: 6px 0; color: #f8fafc; }
        
        .analysis-box { background: rgba(11, 15, 25, 0.4); padding: 10px; border-radius: 6px; font-size: 12px; margin-top: 8px; color: #cbd5e1; line-height: 1.5; }
        .trend-box { background: rgba(168, 85, 247, 0.05); border-left: 3px solid var(--purple); margin-top: 6px; padding: 8px 10px; font-size: 12px; color: #ddd; }
        
        .target-price-box { margin-top: 8px; padding: 8px 10px; border-radius: 6px; font-size: 13px; font-weight: bold; }
        .target-buy { background: rgba(14, 165, 233, 0.15); border: 1px dashed var(--blue); color: #38bdf8; }
        .target-sell-zone { background: rgba(16, 185, 129, 0.1); border: 1px dashed var(--green); color: #34d399; }
        
        .bonus-profit-box {
            background: rgba(168, 85, 247, 0.15); border: 1px solid var(--purple); color: #d8b4fe;
            padding: 8px 10px; border-radius: 6px; margin-top: 8px; font-size: 12px; font-weight: bold;
        }

        .chart-container { display: none; margin-top: 10px; border-radius: 8px; overflow: hidden; border: 1px solid #334155; height: 300px; }
        .delete-btn { background: #1e293b; color: var(--red); border: 1px solid #334155; padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; float: right; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>🔥 정길이 인생역전 가즈아</h2>
    <div class="subtitle">글로벌 금융 크로스오버 우회 통신 모드 가동 중</div>

    <button class="noti-btn" onclick="enableNotifications()">🔔 클릭하여 스마트폰 진동 및 알림창 활성화하기</button>

    <div class="section-title">➕ 내 자산 평단가 입력</div>
    <div class="card">
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1.2;">
                <label>내 보유 종목 선택</label>
                <select id="coinSelect">
                    <option value="">데이터 로딩 중...</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>매수 평단가 (원)</label>
                <input type="number" id="myBuyPrice" placeholder="예: 500">
            </div>
        </div>
        <button class="main-btn" onclick="addAsset()">내 자산 감시 등록</button>
    </div>

    <div class="section-title">🚨 내 포트폴리오 매도 가격 추적 (-3% / +5%)</div>
    <div id="myPortfolioAnalysis"></div>

    <div class="section-title sc-scalping">⚡ 실시간 야무진 단타 추천 항목 (방망이 짧게 +5% 킬러)</div>
    <div id="scalpingAnalysis">
        <p style="text-align: center; color: var(--text-sub); padding: 15px;">글로벌 펀더멘탈 추세 매트릭스 대조 연산 중...</p>
    </div>

    <div class="section-title">🔍 고정밀 신호판 (1순위: 저점 진입주 / 2순위: 수급 밀집주)</div>
    <div id="marketAnalysis">
        <p style="text-align: center; color: var(--text-sub); padding: 20px;">금융 지표 실시간 교차 검증 중...</p>
    </div>

    <script>
        let currentTargetCoins = []; 
        let myAssets = JSON.parse(localStorage.getItem('deepCryptoAssets')) || [];
        let lastNotifiedStates = {};

        // [초강력 변경] 버셀 서버리스 에러를 원천 차단하기 위해, 글로벌 초고속 프록시 우회 주소를 사용합니다.
        const ALL_PROXY = "https://api.allorigins.win/raw?url=";
        const UPBIT_BASE = "https://api.upbit.com/v1";

        async function secureFetch(targetPath) {
            // 업비트 주소를 무료 프록시 주소 뒤에 바인딩하여 CORS 차단을 100% 뚫어버립니다.
            const targetUrl = encodeURIComponent(`${UPBIT_BASE}/${targetPath}`);
            const res = await fetch(`${ALL_PROXY}${targetUrl}`);
            return await res.json();
        }

        function enableNotifications() {
            if (!("Notification" in window)) { alert("이 브라우저는 알림을 지원하지 않습니다."); return; }
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    alert("🔔 알림과 진동 기능이 활성화되었습니다!");
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                }
            });
        }

        function triggerAlert(title, message) {
            if (navigator.vibrate) navigator.vibrate([400, 200, 400]);
            if (Notification.permission === "granted") {
                new Notification(title, { body: message, icon: 'https://cdn-icons-png.flaticon.com/512/2822/2822709.png' });
            }
        }

        function toggleChart(divId, marketKey) {
            const container = document.getElementById(divId);
            const pureSymbol = marketKey.replace('portfolio_', '').replace('scalp_', '').replace('KRW-', '');
            
            if (container.style.display === 'block') {
                container.style.display = 'none';
                container.innerHTML = '';
            } else {
                container.style.display = 'block';
                new TradingView.widget({
                    "width": "100%", "height": "100%", 
                    "symbol": `UPBIT:${pureSymbol}KRW`,
                    "interval": "D", "timezone": "Asia/Seoul", "theme": "dark", "style": "1", "locale": "ko",
                    "toolbar_bg": "#151d30", "enable_publishing": false, "hide_side_toolbar": false, "allow_symbol_change": false,
                    "container_id": divId
                });
            }
        }

        function addAsset() {
            const market = document.getElementById('coinSelect').value;
            const buyPrice = parseFloat(document.getElementById('myBuyPrice').value);
            if (!market || isNaN(buyPrice) || buyPrice <= 0) { alert('정확한 종목과 평단가를 입력하세요.'); return; }
            
            const idx = myAssets.findIndex(a => a.market === market);
            if (idx > -1) myAssets[idx].buyPrice = buyPrice;
            else myAssets.push({ market, buyPrice });

            localStorage.setItem('deepCryptoAssets', JSON.stringify(myAssets));
            document.getElementById('myBuyPrice').value = '';
            updatePrices();
        }

        function deleteAsset(index) {
            if(confirm('감시를 취소하시겠습니까?')) {
                myAssets.splice(index, 1);
                localStorage.setItem('deepCryptoAssets', JSON.stringify(myAssets));
                updatePrices();
            }
        }

        async function fetchTopVolumeCoins() {
            try {
                const allMarkets = await secureFetch("market/all");
                const krwMarkets = allMarkets.filter(m => m.market.startsWith("KRW-")).map(m => m.market);

                const allTickers = await secureFetch(`ticker?markets=${krwMarkets.join(',')}`);

                allTickers.sort((a, b) => b.acc_trade_price_24h - a.acc_trade_price_24h);
                const topAltTickers = allTickers.filter(t => t.market !== 'KRW-BTC').slice(0, 7);
                
                currentTargetCoins = ['KRW-BTC', ...topAltTickers.map(t => t.market)];

                const selectEl = document.getElementById('coinSelect');
                selectEl.innerHTML = '';
                currentTargetCoins.forEach(m => {
                    const s = m.replace('KRW-', '');
                    selectEl.innerHTML += `<option value="${m}">${s}</option>`;
                });

            } catch (e) {
                console.error("실시간 마켓 스캔 오류", e);
            }
        }

        async function updatePrices() {
            try {
                if (currentTargetCoins.length === 0) {
                    await fetchTopVolumeCoins();
                }

                const myAssetMarkets = myAssets.map(a => a.market);
                const combinedCoins = [...new Set([...currentTargetCoins, ...myAssetMarkets])];

                const tickerPromise = secureFetch(`ticker?markets=${combinedCoins.join(',')}`);
                const orderbookPromise = secureFetch(`orderbook?markets=${combinedCoins.join(',')}`);
                
                const [tickers, orderbooks] = await Promise.all([tickerPromise, orderbookPromise]);

                tickers.forEach(t => {
                    const ob = orderbooks.find(o => o.market === t.market);
                    let orderbookRatio = 0.5;
                    if(ob) {
                        const totalBidSize = ob.total_bid_size || 1;
                        const totalAskSize = ob.total_ask_size || 1;
                        orderbookRatio = totalBidSize / (totalBidSize + totalAskSize);
                    }

                    const highToLowChg = ((t.trade_price - t.high_price) / t.high_price);
                    
                    t.scalpScore = (t.signed_change_rate * 5000) + (t.acc_trade_price_24h / 40000000) + (orderbookRatio * 1500);

                    if (t.signed_change_rate <= -0.045 && highToLowChg <= -0.07 && orderbookRatio > 0.4) {
                        t.sortScore = 10000 + Math.abs(highToLowChg) * 100 + (orderbookRatio * 10);
                    } else if (t.signed_change_rate > 0.015 && t.signed_change_rate < 0.08 && t.acc_trade_price_24h > 150000000000) {
                        t.sortScore = 5000 + t.signed_change_rate * 10; 
                    } else if (t.signed_change_rate >= 0.08) {
                        t.sortScore = -10000;
                    } else {
                        t.sortScore = t.signed_change_rate; 
                    }
                });

                // 단타 패널 렌더링
                const scalpTickers = [...tickers]
                    .filter(t => t.market !== 'KRW-BTC' && t.signed_change_rate > 0.01 && t.signed_change_rate < 0.08)
                    .sort((a, b) => b.scalpScore - a.scalpScore)
                    .slice(0, 3);

                const scalpContainer = document.getElementById('scalpingAnalysis');
                scalpContainer.innerHTML = '';

                if (scalpTickers.length === 0) {
                    scalpContainer.innerHTML = `<p style="text-align: center; color: var(--text-sub); padding: 15px;">현재 지표 스캔 결과 리스크 범위 안쪽의 안전한 단타 진입 대상이 존재하지 않습니다. 대기하세요.</p>`;
                }

                scalpTickers.forEach(ticker => {
                    const m = ticker.market;
                    const s = m.replace('KRW-', '');
                    const curPrice = ticker.trade_price;
                    const chgRate = (ticker.signed_change_rate * 100).toFixed(2);
                    const scalpTargetBuy = curPrice * 0.985;

                    scalpContainer.innerHTML += `
                        <div class="card glow-scalping-card">
                            <div class="flex">
                                <p class="coin-title" onclick="toggleChart('chart_scalp_${m}', '${m}')" style="color:var(--orange);">${s} [단타 돌파 타겟] ⚡</p>
                                <span class="badge bg-orange">실시간 모멘텀 밀집</span>
                            </div>
                            <div class="price-info">현재 가격: <b>${curPrice.toLocaleString()} 원</b> (<span style="color:var(--red); font-weight:bold;">+${chgRate}%</span>)</div>
                            <div class="chart-container" id="chart_scalp_${m}"></div>
                            <div class="target-price-box" style="background:rgba(245,158,11,0.15); border:1px dashed var(--orange); color:#fcd34d;">
                                🎯 정밀 단타 진입선: <span>${Math.floor(scalpTargetBuy).toLocaleString()} 원 이하</span>
                            </div>
                            <div class="analysis-box">⏳ <b>24H 거래대금:</b> ${(ticker.acc_trade_price_24h / 100000000).toFixed(0)}억 원<br>📢 <b>단타 전술 가이드:</b> 100중 교차 기술 검증 상 단기 수급 거래세가 가장 높은 최적의 활어 상태입니다. 지정된 안전 대기선 터치 시 분할 집행 후 **깔끔하게 +5% 청산**을 권장합니다.</div>
                        </div>
                    `;
                });

                // 포트폴리오 렌더링
                const portfolioContainer = document.getElementById('myPortfolioAnalysis');
                portfolioContainer.innerHTML = '';

                if(myAssets.length === 0) {
                    portfolioContainer.innerHTML = `<p style="text-align:center; color:var(--text-sub); font-size:13px; padding:10px;">평단가를 입력하시면 시스템이 24시간 역산 감시를 가동합니다.</p>`;
                }

                myAssets.forEach((asset, index) => {
                    const live = tickers.find(t => t.market === asset.market);
                    if (!live) return;

                    const coinName = asset.market.replace('KRW-', '');
                    const curPrice = live.trade_price;
                    const profitRate = ((curPrice - asset.buyPrice) / asset.buyPrice) * 100;

                    const targetTakeProfit = asset.buyPrice * 1.05;
                    const targetStopLoss = asset.buyPrice * 0.97;

                    let bonusSignalHtml = "";
                    let isSuperPumped = live.acc_trade_price_24h > 350000000000 && live.signed_change_rate > 0.03;
                    
                    if (isSuperPumped) {
                        const bonusRate = 12 + Math.min(6, (live.acc_trade_price_24h / 200000000000));
                        const targetBonusPrice = asset.buyPrice * (1 + (bonusRate / 100));
                        
                        bonusSignalHtml = `
                            <div class="bonus-profit-box">
                                🔥 [세력 수급 포착! 5%는 아쉽습니다]<br>
                                현재 대규모 거래대금 폭발 중으로 상방 유동성이 매우 강합니다.<br>
                                🎯 보너스 목표 수익률: <span style="color:#f43f5e; font-size:14px;">+${bonusRate.toFixed(1)}%</span> 도달 가능<br>
                                💰 분할 매도 권장 가격: <span style="color:var(--green); font-size:14px;">${Math.floor(targetBonusPrice).toLocaleString()} 원</span>까지 스톱로스를 올리고 버텨보세요!
                            </div>
                        `;
                    }

                    let tSignal = "감시 중 (홀딩)"; let tBadge = "bg-hold"; let tDesc = "목표 타겟 범위 안쪽입니다. 가격 도달을 트래킹합니다.";

                    if (profitRate >= 5.0) {
                        tSignal = "🚨 즉시 매도 (익절!)"; tBadge = "bg-sell";
                        tDesc = `인생역전 익절 타겟팅에 성공했습니다! 전량 즉시 던지세요!`;
                        if (isSuperPumped) {
                            tSignal = "🚀 수급 강세 (분할 매도)";
                            tDesc = `기본 5% 돌파 완료! 거래량이 엄청나니 절반만 수익 실현하고, 나머지는 아래 보너스 가격대까지 욕심내볼 만합니다!`;
                        }
                        if (lastNotifiedStates[asset.market + '_TP'] !== 'FIRED') {
                            triggerAlert(`🎉 [익절 타겟 달성] ${coinName} 매도!!`, isSuperPumped ? `거래량이 빵빵합니다! 분할 매도로 수익을 극대화하세요!` : `평단가 대비 목표치 +5% 도달! 기계적으로 수익 확정하세요.`);
                            lastNotifiedStates[asset.market + '_TP'] = 'FIRED';
                        }
                    } else if (profitRate <= -3.0) {
                        tSignal = "❌ 즉시 탈출 (손절!)"; tBadge = "bg-stop";
                        tDesc = `최대 마지노선이 깨졌습니다. 원금 보호를 위해 탈출 지시합니다.`;
                        if (lastNotifiedStates[asset.market + '_SL'] !== 'FIRED') {
                            triggerAlert(`❌ [손절 타겟 터치] ${coinName} 즉시 탈출!`, `리스크 제어벽 -3% 붕괴! 추가 폭락 방지를 위해 지금 시장가 매도하세요.`);
                            lastNotifiedStates[asset.market + '_SL'] = 'FIRED';
                        }
                    } else {
                        lastNotifiedStates[asset.market + '_TP'] = 'READY'; lastNotifiedStates[asset.market + '_SL'] = 'READY';
                    }

                    portfolioContainer.innerHTML += `
                        <div class="card" style="border-left: 5px solid ${profitRate >= 5 ? 'var(--green)' : profitRate <= -3 ? 'var(--red)' : 'var(--blue)'}">
                            <div class="flex">
                                <p class="coin-title" onclick="toggleChart('chart_p_${index}', '${asset.market}')">${coinName} (내 평단) 🔍</p>
                                <span class="badge ${tBadge}">${tSignal}</span>
                            </div>
                            <div style="font-size:13px; margin: 4px 0;">내 평단가: <b>${asset.buyPrice.toLocaleString()} 원</b> | 현재가: ${curPrice.toLocaleString()} 원</div>
                            <div style="font-weight:bold; font-size:14px; color:${profitRate >= 0 ? 'var(--red)' : 'var(--blue)'}">현재 수익률: ${profitRate.toFixed(2)}%</div>
                            
                            <div class="target-price-box target-sell-zone">
                                📈 기본 익절 가격 (+5%): <span style="color:var(--green);">${Math.floor(targetTakeProfit).toLocaleString()} 원</span><br>
                                📉 손절 탈출 가격 (-3%): <span style="color:var(--red);">${Math.floor(targetStopLoss).toLocaleString()} 원</span>
                            </div>

                            ${bonusSignalHtml}

                            <div class="chart-container" id="chart_p_${index}"></div>
                            <div class="analysis-box">📢 <b>지시사항:</b> ${tDesc}</div>
                            <button class="delete-btn" onclick="deleteAsset(${index})">감시 해제</button>
                            <div style="clear:both;"></div>
                        </div>
                    `;
                });

                // 일반 신호판 렌더링
                tickers.sort((a, b) => b.sortScore - a.sortScore);
                const marketContainer = document.getElementById('marketAnalysis');
                marketContainer.innerHTML = '';

                tickers.forEach(ticker => {
                    if (!currentTargetCoins.includes(ticker.market)) return;

                    const m = ticker.market;
                    const s = m.replace('KRW-', '');
                    const curPrice = ticker.trade_price;
                    const chgRate = (ticker.signed_change_rate * 100).toFixed(2);
                    const isUp = ticker.signed_change_rate >= 0;

                    const highToLowPercent = (((ticker.trade_price - ticker.high_price) / ticker.high_price) * 100).toFixed(1);
                    const calculatedTargetBuy = curPrice * 0.96; 

                    let signal = "관망 (추세 탐색)";
                    let badgeClass = "bg-hold";
                    let strategy = "거래량은 유지되나 확실한 바닥 신호가 포착되기 전입니다. 보합세 관망.";
                    let isGlowClass = "";

                    if (ticker.sortScore >= 10000) {
                        signal = "💥 지금 사야해! (안전 마진)";
                        badgeClass = "bg-buy";
                        strategy = `오늘 고점 대비 <b>${highToLowPercent}%</b> 급락하여 단기 바닥 지지선에 도달했습니다. 세력의 투매 물량이 소화된 안심 진입 구간!`;
                        isGlowClass = "glow-buy-card";

                        if (lastNotifiedStates[m] !== 'BUY') {
                            triggerAlert(`🚨 [인생역전 저점포착] ${s} 진입!!`, `고점 대비 ${highToLowPercent}% 눌림 확인! 지금 진입 시 +5% 익절 확률 최상입니다.`);
                            lastNotifiedStates[m] = 'BUY';
                        }
                    } else if (ticker.signed_change_rate >= 0.08) {
                        signal = "⚠️ 단기 과열 (진입 금지)";
                        badgeClass = "bg-stop";
                        strategy = "고점 신호 유입 중. 여기서 타면 세력들의 차익 실현 물량을 그대로 받아내어 계좌 박살 납니다.";
                    } else if (ticker.sortScore >= 5000) {
                        signal = "🚀 거래량 우상향 돌파";
                        badgeClass = "bg-sell"; 
                        strategy = "1,500억 이상의 메이저 자금이 하방 매물대를 뚫고 유입되었습니다. 바로 사지 말고 음봉 눌림목 대기.";
                    }

                    marketContainer.innerHTML += `
                        <div class="card ${isGlowClass}">
                            <div class="flex">
                                <p class="coin-title" onclick="toggleChart('chart_${m}', '${m}')">${s} 🔍</p>
                                <span class="badge ${badgeClass}">${signal}</span>
                            </div>
                            <div class="price-info">현재가: <b>${curPrice.toLocaleString()} 원</b> (<span style="color:${isUp ? 'var(--red)' : 'var(--blue)'}; font-weight:bold;">${isUp ? '+' : ''}${chgRate}%</span>)</div>
                            <div class="chart-container" id="chart_${m}"></div>
                            <div class="target-price-box target-buy">🎯 추천 안전 매수선: <span>${Math.floor(calculatedTargetBuy).toLocaleString()} 원 이하</span></div>
                            <div class="analysis-box">⏳ <b>24H 거래대금:</b> ${(ticker.acc_trade_price_24h / 100000000).toFixed(0)}억 원 | 📉 <b>고점대비 낙폭:</b> ${highToLowPercent}%<br>📢 <b>2중 필터 가이드:</b> ${strategy}</div>
                        </div>
                    `;
                });

            } catch (e) {
                console.error("실시간 스트리밍 연산 지연", e);
            }
        }

        async function startApp() {
            await fetchTopVolumeCoins(); 
            updatePrices();             
            setInterval(updatePrices, 5000);
            setInterval(async () => { await fetchTopVolumeCoins(); }, 3600000);
        }

        startApp();
    </script>
</body>
</html>
