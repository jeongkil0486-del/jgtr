<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trinity 안내 방송</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        :root {
            --navy:#0B1E3D; --navy-l:#132847; --gold:#C9A84C; --gold-l:#E8C97A;
            --gold-dim:rgba(201,168,76,0.15); --white:#FFF; --g1:#F4F6FA;
            --g2:#E8ECF2; --g3:#94A3B8; --g4:#475569; --red:#E53935;
            --green:#10B981; --amber:#F59E0B; --text:#1E293B; --r:12px;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(145deg,#0B1E3D 0%,#1a3a6e 100%);min-height:100vh;padding:16px;color:var(--text);}
        .wrap{max-width:620px;margin:0 auto;}
        .hdr{text-align:center;padding:28px 0 20px;}
        .hdr-badge{display:inline-block;background:var(--gold-dim);border:1px solid var(--gold);color:var(--gold-l);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:12px;}
        .hdr h1{font-size:26px;font-weight:900;color:#fff;letter-spacing:-0.5px;}
        .hdr h1 span{color:var(--gold);}
        .hdr-sub{font-size:11px;color:var(--g3);margin-top:6px;letter-spacing:1px;}
        .card{background:#fff;border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:0 8px 32px rgba(11,30,61,.12);}
        .card-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
        .card-title::before{content:'';display:block;width:3px;height:14px;background:var(--gold);border-radius:2px;}
        select,input[type=text],input[type=password]{width:100%;padding:11px 14px;border:1.5px solid var(--g2);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text);background:var(--g1);-webkit-appearance:none;}
        select:focus,input:focus{outline:none;border-color:var(--gold);}
        textarea{width:100%;padding:12px 14px;border:1.5px solid var(--g2);border-radius:8px;font-size:13px;font-family:inherit;line-height:1.7;resize:vertical;background:var(--g2);color:var(--text);}
        textarea:focus{outline:none;border-color:var(--gold);}
        button{border:none;border-radius:8px;font-size:13px;font-family:inherit;font-weight:700;cursor:pointer;padding:10px 16px;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:4px;}
        button:active{transform:scale(.97);}
        .btn-gold{background:var(--gold);color:var(--navy);}
        .btn-slate{background:var(--g4);color:#fff;}
        .btn-green{background:var(--green);color:#fff;}
        .btn-red{background:var(--red);color:#fff;}
        .frow{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
        .frow:last-child{margin-bottom:0;}
        .sel-row{display:flex;gap:8px;}
        .mgmt{display:none;margin-top:14px;padding-top:14px;border-top:1px dashed var(--g2);}
        .mgmt-b{background:var(--g1);border-radius:8px;padding:12px;margin-bottom:8px;}
        .mgmt-lbl{font-size:11px;font-weight:700;color:var(--g4);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
        .tuning-block{display:none;background:var(--g1);border-radius:8px;overflow:hidden;margin-top:12px;}
        .tuning-hdr{padding:10px 14px;font-size:12px;font-weight:700;color:var(--navy);cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center;}
        .tuning-row{display:flex;align-items:center;gap:10px;padding:7px 14px;border-top:1px solid var(--g2);font-size:12px;color:var(--g4);}
        .tuning-row span:first-child{width:95px;flex-shrink:0;font-weight:500;}
        .tuning-row input[type=range]{flex:1;accent-color:var(--gold);}
        .sv{width:34px;text-align:right;font-weight:700;color:var(--navy);font-size:12px;}
        .save-grp{display:none;gap:8px;margin-top:10px;}
        .save-grp.show{display:flex;}
        .dyn-grp{display:flex;align-items:center;gap:10px;background:var(--g1);border:1.5px solid var(--g2);padding:10px 14px;border-radius:8px;margin-bottom:8px;}
        .dyn-grp:last-child{margin-bottom:0;}
        .dyn-grp label{font-size:12px;font-weight:600;color:var(--g4);width:80px;flex-shrink:0;}
        .dyn-grp input{background:#fff;margin:0;}
        .preview-box{background:linear-gradient(135deg,#0B1E3D 0%,#132847 100%);border-left:4px solid var(--gold);border-radius:8px;padding:16px;min-height:60px;font-size:13px;line-height:1.8;color:#CBD5E1;white-space:pre-wrap;word-break:break-all;}
        .play-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
        .btn-play-main{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-l) 100%);color:var(--navy);font-size:16px;font-weight:900;padding:16px;border-radius:10px;}
        .btn-pause-main{background:var(--navy-l);color:#fff;font-size:15px;font-weight:700;padding:16px;border-radius:10px;border:1.5px solid rgba(201,168,76,.3);}
        .footer{text-align:center;padding:16px 0 8px;font-size:11px;color:rgba(255,255,255,.2);letter-spacing:1px;}
        .trans-badge{display:none;font-size:11px;color:var(--gold);font-weight:600;padding:3px 10px;background:var(--gold-dim);border-radius:20px;margin-left:6px;}
    </style>
</head>
<body>
<div class="wrap">
    <div class="hdr">
        <div class="hdr-badge">✈ AI Announcement System</div>
        <h1>Trinity <span>안내 방송</span></h1>
        <div class="hdr-sub">Powered by Google WaveNet TTS</div>
    </div>

    <!-- 방송 선택 -->
    <div class="card">
        <div class="card-title">방송 선택</div>
        <div class="sel-row">
            <select id="status" onchange="loadTemplate()" style="flex:1.5;"></select>
            <select id="language" onchange="loadTemplate()" style="flex:1.2;"></select>
        </div>
        <div class="mgmt" id="master-management-panel">
            <div class="mgmt-b">
                <div class="mgmt-lbl">방송 항목 관리</div>
                <div class="frow"><input type="text" id="newStatusInput" placeholder="새 항목 이름"><button class="btn-green" style="white-space:nowrap;font-size:12px;" onclick="addStatusItem()">+ 추가</button></div>
                <div class="frow"><input type="text" id="renameStatusInput" placeholder="이름 수정"><button class="btn-slate" style="font-size:12px;" onclick="renameStatusItem()">수정</button><button class="btn-red" style="font-size:12px;" onclick="deleteStatusItem()">삭제</button></div>
            </div>
            <div class="mgmt-b">
                <div class="mgmt-lbl">언어 항목 관리</div>
                <div class="frow"><input type="text" id="newLangInput" placeholder="새 언어 이름"><button class="btn-green" style="white-space:nowrap;font-size:12px;" onclick="addLangItem()">+ 추가</button></div>
                <div class="frow"><input type="text" id="renameLangInput" placeholder="이름 수정"><button class="btn-slate" style="font-size:12px;" onclick="renameLangItem()">수정</button><button class="btn-red" style="font-size:12px;" onclick="deleteLangItem()">삭제</button></div>
            </div>
        </div>
    </div>

    <!-- 방송문 -->
    <div class="card">
        <div class="card-title">방송문</div>
        <div class="frow">
            <input type="password" id="passwordInput" placeholder="관리자 비밀번호" style="flex:1;">
            <button class="btn-gold" onclick="unlockTemplate()">해제</button>
            <button class="btn-slate" onclick="lockTemplate()">잠금</button>
        </div>
        <textarea id="templateInput" rows="10" readonly disabled oninput="renderDynamicInputs()"></textarea>
        <div class="save-grp" id="save-control-group">
            <button class="btn-green" style="flex:1;" onclick="saveTemplate()">💾 저장</button>
            <button class="btn-slate" onclick="resetDefaultTemplate()">초기화</button>
        </div>
        <div class="tuning-block" id="tuningBlock">
            <div class="tuning-hdr" onclick="toggleTuning()"><span>⚙️ 속도 · 피치 조정</span><span id="tuningArrow">▼</span></div>
            <div id="tuningPanel" style="display:none;">
                <div class="tuning-row"><span>🇰🇷 한국어 속도</span><input type="range" id="rateKO" min="0.5" max="1.5" step="0.05" value="0.95" oninput="updateLabel('rateKO')"><span id="rateKO_label" class="sv">0.95</span></div>
                <div class="tuning-row"><span>🇰🇷 한국어 피치</span><input type="range" id="pitchKO" min="-10" max="10" step="0.5" value="0" oninput="updateLabel('pitchKO')"><span id="pitchKO_label" class="sv">0</span></div>
                <div class="tuning-row"><span>🇯🇵 일본어 속도</span><input type="range" id="rateJA" min="0.5" max="1.5" step="0.05" value="1.05" oninput="updateLabel('rateJA')"><span id="rateJA_label" class="sv">1.05</span></div>
                <div class="tuning-row"><span>🇯🇵 일본어 피치</span><input type="range" id="pitchJA" min="-10" max="10" step="0.5" value="0" oninput="updateLabel('pitchJA')"><span id="pitchJA_label" class="sv">0</span></div>
                <div class="tuning-row"><span>🇺🇸 영어 속도</span><input type="range" id="rateEN" min="0.5" max="1.5" step="0.05" value="0.95" oninput="updateLabel('rateEN')"><span id="rateEN_label" class="sv">0.95</span></div>
                <div class="tuning-row"><span>🇺🇸 영어 피치</span><input type="range" id="pitchEN" min="-10" max="10" step="0.5" value="0" oninput="updateLabel('pitchEN')"><span id="pitchEN_label" class="sv">0</span></div>
            </div>
        </div>
    </div>

    <!-- 공란 입력 -->
    <div class="card" id="dynamic-section" style="display:none;">
        <div class="card-title">공란 입력 <span class="trans-badge" id="translatingBadge">🔄 번역 중...</span></div>
        <div id="dynamic-inputs-container"></div>
    </div>

    <!-- 미리보기 -->
    <div class="card">
        <div class="card-title">최종 방송문</div>
        <div class="preview-box" id="scriptPreview"></div>
    </div>

    <div class="play-bar">
        <button class="btn-play-main" onclick="playTTS()">🔊 방송 시작</button>
        <button class="btn-pause-main" id="pauseBtn" onclick="togglePause()">⏸ 일시 정지</button>
    </div>
    <div class="footer">TRINITY AIRLINES · AI ANNOUNCEMENT SYSTEM</div>
</div>

<script>
const ADMIN_PASSWORD = "0501";
const GOOGLE_TTS_KEY = 'AIzaSyDPwwNLJSnPoADJn41CuZevx7j6-KWRwiQ';

const GOOGLE_VOICES = {
    'ko-KR':{ languageCode:'ko-KR', name:'ko-KR-Neural2-B', ssmlGender:'FEMALE' },
    'ja-JP':{ languageCode:'ja-JP', name:'ja-JP-Wavenet-B', ssmlGender:'FEMALE' },
    'en-US':{ languageCode:'en-US', name:'en-US-Neural2-F', ssmlGender:'FEMALE' },
    'zh-CN':{ languageCode:'cmn-CN', name:'cmn-CN-Wavenet-D', ssmlGender:'FEMALE' },
};

let isPaused=false, currentSentenceIndex=0, speechParts=[];
let varValues={}, translateTimer=null;

const initialStatusList=[
    {id:"status_1",name:"우선탑승 (Pre-boarding)"},
    {id:"status_2",name:"탑승중 (Boarding)"},
    {id:"status_3",name:"탑승마감 (Final Call)"}
];
const initialLangList=[
    {id:"lang_1",name:"종합 방송"},
    {id:"lang_2",name:"한국어 전용"},
    {id:"lang_3",name:"영어 전용"}
];
const defaultTemplates={
    "status_1_lang_1":`더 멋진 변화의 시작, 티웨이항공에서 안내 말씀드리겠습니다. 잠시 후 티웨이항공 [편명] 편 [목적지]행 항공기의 탑승이 시작될 예정입니다. 원활하고 신속한 탑승을 위하여 몸이 불편하신 손님 및 유아를 동반하신 손님, 플래티넘 손님께서 먼저 탑승을 준비하여 주시기 바랍니다. 감사합니다.\n\nYour attention please. T'way Air flight (편명) bound for (목적지) is now ready for boarding. For efficient boarding, we will invite passengers who need special assistance, or are traveling with infants, business saver, t'way plus Platinum to board first. Thank you.\n\nT'way 航空よりご案内申し上げます。まもなくT'way 航空（편명）便（목적지）行きのご搭乗を開始させて頂きます。まず始めに、体の具合が悪いお客様およびお子様連れのお客様より機内へのご案内をさせて頂きますので、搭乗券をお持ちになって、搭乗口前にお越しください。`
};
const translationDic={
    "오사카":{en:"Osaka",ja:"大阪",zh:"大阪"},
    "후쿠오카":{en:"Fukuoka",ja:"福岡",zh:"福冈"},
    "나리타":{en:"Narita",ja:"成田",zh:"成田"},
    "삿포로":{en:"Sapporo",ja:"札幌",zh:"扎幌"},
    "나트랑":{en:"Nha Trang",ja:"ニャチャン",zh:"芽庄"},
    "홍콩":{en:"Hong Kong",ja:"香港",zh:"香港"},
    "가오슝":{en:"Kaohsiung",ja:"高雄",zh:"高雄"}
};

window.onload=function(){ loadTemplate(); };

function toggleTuning(){
    const p=document.getElementById('tuningPanel'), a=document.getElementById('tuningArrow');
    const s=p.style.display!=='none'; p.style.display=s?'none':'block'; a.textContent=s?'▼':'▲';
}
function updateLabel(id){ document.getElementById(id+'_label').textContent=document.getElementById(id).value; }

function initSelectBoxes(){
    // Firebase 구독으로 초기화 — 여기선 아무것도 안 함
}
function renderSelectOptions(statusList, langList){
    const ss=document.getElementById('status'),ls=document.getElementById('language');
    const sv=ss.value,lv=ls.value;
    ss.innerHTML=""; statusList.forEach(i=>{const o=document.createElement('option');o.value=i.id;o.text=i.name;ss.appendChild(o);});
    ls.innerHTML=""; langList.forEach(i=>{const o=document.createElement('option');o.value=i.id;o.text=i.name;ls.appendChild(o);});
    if(sv&&ss.querySelector(`option[value="${sv}"]`)) ss.value=sv;
    if(lv&&ls.querySelector(`option[value="${lv}"]`)) ls.value=lv;
}
function addStatusItem(){const n=document.getElementById('newStatusInput').value.trim();if(!n)return alert("이름을 입력하세요.");const id="status_"+Date.now();const l=[...window._statusList,{id,name:n}];db.ref('master/status').set(l);document.getElementById('newStatusInput').value="";}
function renameStatusItem(){const s=document.getElementById('status');const n=document.getElementById('renameStatusInput').value.trim();if(!n)return alert("이름을 입력하세요.");const l=window._statusList.map(x=>x.id===s.value?{...x,name:n}:x);db.ref('master/status').set(l);}
function deleteStatusItem(){const s=document.getElementById('status');if(window._statusList.length<=1)return alert("최소 한 개는 있어야 합니다.");if(!confirm("정말 삭제하시겠습니까?"))return;db.ref('master/status').set(window._statusList.filter(i=>i.id!==s.value));}
function addLangItem(){const n=document.getElementById('newLangInput').value.trim();if(!n)return alert("이름을 입력하세요.");const id="lang_"+Date.now();const l=[...window._langList,{id,name:n}];db.ref('master/lang').set(l);document.getElementById('newLangInput').value="";}
function renameLangItem(){const s=document.getElementById('language');const n=document.getElementById('renameLangInput').value.trim();if(!n)return alert("이름을 입력하세요.");const l=window._langList.map(x=>x.id===s.value?{...x,name:n}:x);db.ref('master/lang').set(l);}
function deleteLangItem(){const s=document.getElementById('language');if(window._langList.length<=1)return alert("최소 한 개는 있어야 합니다.");if(!confirm("정말 삭제하시겠습니까?"))return;db.ref('master/lang').set(window._langList.filter(i=>i.id!==s.value));}

function getStorageKey(){return`tway_final_${document.getElementById('status').value}_${document.getElementById('language').value}`;}
function loadTemplate(){
    const ss=document.getElementById('status'),ls=document.getElementById('language');
    if(!ss.options.length||!ls.options.length)return;
    document.getElementById('renameStatusInput').value=ss.options[ss.selectedIndex].text;
    document.getElementById('renameLangInput').value=ls.options[ls.selectedIndex].text;
    const key=getStorageKey(),saved=localStorage.getItem(key),combo=`${ss.value}_${ls.value}`;
    document.getElementById('templateInput').value=saved||defaultTemplates[combo]||`Trinity 안내 방송입니다.\n[편명] 및 [목적지]를 입력하세요.`;
    const unlocked=!document.getElementById('templateInput').readOnly;
    document.getElementById('master-management-panel').style.display=unlocked?'block':'none';
    // varValues 유지 — 항목 바뀌어도 기존 입력값 보존 후 즉시 재번역
    stopTTSComplete();
    renderDynamicInputs();
    // 기존 값이 있으면 바로 재번역해서 반영
    Object.keys(varValues).forEach(key=>{ if(varValues[key]?.ko) autoTranslateVar(key); });
}
function saveTemplate(){
    const key=getStorageKey(),val=document.getElementById('templateInput').value;
    localStorage.setItem(key,val);
    saveTemplateToFirebase(key,val);
    alert('💾 저장되었습니다.');
    lockTemplate();
}
function unlockTemplate(){
    if(document.getElementById('passwordInput').value===ADMIN_PASSWORD){
        const ti=document.getElementById('templateInput');
        ti.readOnly=false;ti.disabled=false;ti.style.background='#fff';
        document.getElementById('save-control-group').classList.add('show');
        document.getElementById('master-management-panel').style.display='block';
        document.getElementById('tuningBlock').style.display='block';
    } else alert("❌ 비밀번호가 올바르지 않습니다.");
}
function lockTemplate(){
    const ti=document.getElementById('templateInput');
    ti.readOnly=true;ti.disabled=true;ti.style.background='';
    document.getElementById('save-control-group').classList.remove('show');
    document.getElementById('master-management-panel').style.display='none';
    document.getElementById('tuningBlock').style.display='none';
    document.getElementById('passwordInput').value='';
}
function resetDefaultTemplate(){if(confirm("기본 양식으로 복원하시겠습니까?")){localStorage.removeItem(getStorageKey());loadTemplate();}}

// ── 공란 변수 추출 — [ ] 형태만 공란으로 인식 ──────────
function extractVariables(template){
    const seen=new Map();
    const re=/\[([^\]]+)\]/g;
    let m;
    while((m=re.exec(template))!==null){
        const raw=m[1].trim();
        if(!seen.has(raw)) seen.set(raw,raw);
    }
    return Array.from(seen.entries()).map(([k,l])=>({key:k,label:l}));
}

function renderDynamicInputs(){
    const template=document.getElementById('templateInput').value;
    const container=document.getElementById('dynamic-inputs-container');
    const vars=extractVariables(template);
    if(vars.length===0){document.getElementById('dynamic-section').style.display='none';return;}
    document.getElementById('dynamic-section').style.display='block';

    const prev={};
    vars.forEach(v=>{const el=document.getElementById('var_'+v.key);prev[v.key]=el?el.value:(varValues[v.key]?.ko||'');});

    container.innerHTML=vars.map(v=>`
        <div class="dyn-grp">
            <label>${getVarIcon(v.key)}${v.label}</label>
            <input type="text" id="var_${v.key}" value="${prev[v.key]||''}" placeholder="${v.label} 입력" oninput="onVarInput('${v.key}')">
        </div>`).join('');
    composeFinalScript();
}

function getVarIcon(k){ if(k.includes('편명')||k.toLowerCase().includes('flight')) return '✈️ '; if(k.includes('목적지')||k.toLowerCase().includes('dest')) return '📍 '; return '📝 '; }

function onVarInput(key){
    if(translateTimer) clearTimeout(translateTimer);
    translateTimer=setTimeout(()=>autoTranslateVar(key),700);
    composeFinalScript();
}

async function autoTranslateVar(key){
    const el=document.getElementById('var_'+key);
    if(!el) return;
    const koVal=el.value.trim();
    if(!koVal) return;

    // 편명 → 숫자 변환만
    if(key.includes('편명')||key.toLowerCase().includes('flight')){
        varValues[key]={ko:expandFlight(koVal,'ko'),en:expandFlight(koVal,'en'),ja:expandFlight(koVal,'ja'),zh:expandFlight(koVal,'zh')};
        composeFinalScript(); return;
    }
    // 사전 우선
    if(translationDic[koVal]){
        varValues[key]={ko:koVal,...translationDic[koVal]};
        composeFinalScript(); return;
    }
    // Google Translate
    document.getElementById('translatingBadge').style.display='inline-block';
    try {
        const [en,ja,zh]=await Promise.all([gTranslate(koVal,'en'),gTranslate(koVal,'ja'),gTranslate(koVal,'zh')]);
        varValues[key]={ko:koVal,en,ja,zh};
    } catch(e){ varValues[key]={ko:koVal,en:koVal,ja:koVal,zh:koVal}; }
    document.getElementById('translatingBadge').style.display='none';
    composeFinalScript();
}

async function gTranslate(text,target){
    const resp=await fetch(`https://translation.googleapis.com/language/translate/v2?key=${GOOGLE_TTS_KEY}`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({q:text,source:'ko',target,format:'text'})
    });
    const data=await resp.json();
    return data?.data?.translations?.[0]?.translatedText||text;
}

function expandFlight(f,lang){
    const ko={'0':'영','1':'일','2':'이','3':'삼','4':'사','5':'오','6':'육','7':'칠','8':'팔','9':'구'};
    const ja={'0':'ゼロ','1':'いち','2':'に','3':'さん','4':'よん','5':'ご','6':'ろく','7':'なな','8':'はち','9':'きゅう'};
    const zh={'0':'零','1':'一','2':'二','3':'三','4':'四','5':'五','6':'六','7':'七','8':'八','9':'九'};
    if(lang==='en'){
        // 알파벳 코드는 붙이고, 숫자만 공백으로 분리 (ex: TW123 → "TW 1 2 3")
        const alpha=f.replace(/[0-9]/g,'').trim();
        const digits=f.replace(/[^0-9]/g,'').split('').join(' ');
        return (alpha+(digits?' '+digits:'')).trim();
    }
    return f.split('').map(c=>{
        if(/[0-9]/.test(c)){if(lang==='ko')return ko[c];if(lang==='ja')return ja[c];if(lang==='zh')return zh[c];}
        return c;
    }).join(' ');
}

function composeFinalScript(){
    const vars=extractVariables(document.getElementById('templateInput').value);
    const origLines=document.getElementById('templateInput').value.split('\n');

    const resultLines=origLines.map(origLine=>{
        let line=origLine;
        // 언어는 원본 줄 기준으로 판별 (치환 전)
        const lang=detectOrigLang(origLine);
        vars.forEach(v=>{
            const vals=varValues[v.key];
            const el=document.getElementById('var_'+v.key);
            const ko=vals?vals.ko:(el?el.value:'___');
            const en=vals?vals.en:ko;
            const ja=vals?vals.ja:ko;
            const zh=vals?vals.zh:ko;
            const k=escRe(v.key);

            // [] → 줄 언어에 맞는 값으로
            let replaceVal=ko;
            if(lang==='en-US') replaceVal=en;
            else if(lang==='ja-JP') replaceVal=ja;
            else if(lang==='zh-CN') replaceVal=zh;
            line=line.replace(new RegExp(`\\[${k}\\]`,'g'),replaceVal);

            // 명시적 괄호 형태
            line=line.replace(new RegExp(`\\(${k}\\)`,'g'),en);
            line=line.replace(new RegExp(`（${k}）`,'g'),ja);
            line=line.replace(new RegExp(`\\{${k}\\}`,'g'),zh);
        });
        return line;
    });

    document.getElementById('scriptPreview').innerText=resultLines.join('\n');
}

// 원본 템플릿 줄의 언어 판별 — [변수명] 플레이스홀더 무시하고 주변 텍스트로 판별
function detectOrigLang(line){
    const stripped=line.replace(/\[[^\]]+\]/g,'').replace(/\([^)]+\)/g,'').replace(/（[^）]+）/g,'').replace(/\{[^}]+\}/g,'');
    if(/[가-힣]/.test(stripped)) return 'ko-KR';
    if(/[ぁ-んァ-ン]/.test(stripped)) return 'ja-JP';
    if(/[一-龥]/.test(stripped)) return 'zh-CN';
    if(/[A-Za-z]{3,}/.test(stripped)) return 'en-US';
    if(/[가-힣]/.test(line)) return 'ko-KR';
    if(/[ぁ-んァ-ン]/.test(line)) return 'ja-JP';
    if(/[一-龥]/.test(line)) return 'zh-CN';
    if(/[A-Za-z]/.test(line)) return 'en-US';
    return 'ko-KR';
}

function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

// ── Google Cloud TTS ─────────────────────────────────
function playTTS(){ stopTTSComplete(); playGoogleTTS(); }

async function playGoogleTTS(){
    const fullText=document.getElementById('scriptPreview').innerText;
    speechParts=buildSpeechParts(fullText);
    if(speechParts.length===0) return;
    const btn=document.getElementById('pauseBtn');
    btn.innerText='⏳ 생성 중...'; btn.disabled=true;
    // iOS Safari: Promise.all 병렬 fetch 시 일부 오디오 차단 문제 → 순차 fetch
    try {
        for(let i=0;i<speechParts.length;i++){
            speechParts[i].audioUrl=await fetchGoogleAudio(speechParts[i]);
        }
    } catch(e){ alert('Google TTS 오류: '+e.message); btn.disabled=false; resetPauseButton(); return; }
    btn.disabled=false; resetPauseButton();
    currentSentenceIndex=0; isPaused=false;
    playGoogleQueue();
}

async function fetchGoogleAudio(item){
    const voice=GOOGLE_VOICES[item.lang]||GOOGLE_VOICES['ko-KR'];
    const rate=item.lang==='ja-JP'?parseFloat(document.getElementById('rateJA').value):
               item.lang==='ko-KR'?parseFloat(document.getElementById('rateKO').value):
               item.lang==='zh-CN'?0.95:
               parseFloat(document.getElementById('rateEN').value);
    const pitch=item.lang==='ja-JP'?parseFloat(document.getElementById('pitchJA').value):
                item.lang==='ko-KR'?parseFloat(document.getElementById('pitchKO').value):
                item.lang==='zh-CN'?0:
                parseFloat(document.getElementById('pitchEN').value);
    const resp=await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${GOOGLE_TTS_KEY}`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({input:{text:item.text},voice,audioConfig:{audioEncoding:'MP3',speakingRate:rate,pitch}})
    });
    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||resp.statusText);}
    const data=await resp.json();
    return 'data:audio/mp3;base64,' + data.audioContent;
}

function playGoogleQueue(){
    if(isPaused||currentSentenceIndex>=speechParts.length){if(currentSentenceIndex>=speechParts.length)resetPauseButton();return;}
    const item=speechParts[currentSentenceIndex];
    const audio=new Audio(item.audioUrl);
    window._currentAudio=audio;
    audio.onended=function(){currentSentenceIndex++;setTimeout(playGoogleQueue,item.pauseAfter);};
    audio.onerror=function(){currentSentenceIndex++;playGoogleQueue();};
    audio.play();
}

function buildSpeechParts(fullText){
    const parts=[];
    const paragraphs=fullText.split(/\n{2,}/).map(p=>p.trim()).filter(p=>p);

    paragraphs.forEach(para=>{
        const lang=detectParaLang(para);
        if(lang==='en-US'){
            // 영어 단락 전체를 하나로 → 목소리 완전 통일
            parts.push({text:para.replace(/\n/g,' '),lang:'en-US',pauseAfter:1200});
        } else if(lang==='ja-JP'){
            const segs=para.replace(/\n/g,'').split(/([。！？])/);let acc="";
            segs.forEach(p=>{if(!p)return;if(/^[。！？]$/.test(p)){if(acc.trim()){parts.push({text:acc.trim()+p,lang:'ja-JP',pauseAfter:900});acc="";}}else acc+=p;});
            if(acc.trim()) parts.push({text:acc.trim(),lang:'ja-JP',pauseAfter:1200});
        } else if(lang==='zh-CN'){
            const segs=para.replace(/\n/g,'').split(/([。！？，、])/);let acc="";
            segs.forEach(p=>{if(!p)return;if(/^[。！？，、]$/.test(p)){if(acc.trim()){parts.push({text:acc.trim()+p,lang:'zh-CN',pauseAfter:p==='，'||p==='、'?350:900});acc="";}}else acc+=p;});
            if(acc.trim()) parts.push({text:acc.trim(),lang:'zh-CN',pauseAfter:1200});
        } else {
            para.split('\n').forEach(line=>{
                if(!line.trim()) return;
                const segs=line.split(/([.!?,，])/);let acc="";
                segs.forEach(p=>{
                    if(!p)return;
                    if(/^[.!?,，]$/.test(p)){
                        if(acc.trim().length>1){const text=acc.trim()+(p===','||p==='，'?'':p);parts.push({text,lang:'ko-KR',pauseAfter:p===','||p==='，'?350:800});acc="";}
                    } else acc+=p;
                });
                if(acc.trim().length>1) parts.push({text:acc.trim(),lang:'ko-KR',pauseAfter:1200});
            });
        }
    });
    return parts;
}

function detectLang(t){
    if(/[가-힣]/.test(t)) return 'ko-KR';
    if(/[ぁ-んァ-ン]/.test(t)) return 'ja-JP';
    if(/[一-龥]/.test(t)) return 'zh-CN';
    if(/[A-Za-z]/.test(t)) return 'en-US';
    return 'ko-KR';
}

// 단락 전체 언어 판별
function detectParaLang(t){
    if(/[ぁ-んァ-ン]/.test(t)) return 'ja-JP';
    if(/[一-龥]/.test(t)) return 'zh-CN';
    // 숫자/공백/편명용 한글 숫자 제거 후 순수 한글·영문자만 비교
    const onlyLetters=t.replace(/[일이삼사오육칠팔구영\d\s]/g,'');
    const hasKorean=/[가-힣]/.test(onlyLetters);
    const enChars=(onlyLetters.match(/[A-Za-z]/g)||[]).length;
    const total=onlyLetters.length;
    if(!hasKorean && total>0 && enChars/total>0.5) return 'en-US';
    if(hasKorean) return 'ko-KR';
    return 'ko-KR';
}

function togglePause(){
    const btn=document.getElementById('pauseBtn');
    if(!isPaused){
        isPaused=true;if(window._currentAudio)window._currentAudio.pause();
        btn.innerText="▶ 방송 재개";btn.style.background='var(--green)';
    } else {
        isPaused=false;btn.innerText="⏸ 일시 정지";btn.style.background='';
        playGoogleQueue();
    }
}
function stopTTSComplete(){
    if(window._currentAudio){window._currentAudio.pause();window._currentAudio=null;}
    window.speechSynthesis?.cancel();
    isPaused=false;currentSentenceIndex=0;resetPauseButton();
}
function resetPauseButton(){
    isPaused=false;
    const btn=document.getElementById('pauseBtn');
    btn.innerText="⏸ 일시 정지";btn.style.background='';btn.disabled=false;
}
</script>
