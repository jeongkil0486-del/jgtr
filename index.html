<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>t'way AI 안내 방송 시스템 (성우 커스텀)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 12px;
            color: #1e293b;
        }
        .container {
            background-color: white;
            padding: 20px 15px;
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        h2 {
            color: #d62527; 
            text-align: center;
            margin: 5px 0 20px 0;
            font-size: 22px;
            font-weight: 800;
            border-bottom: 3px solid #d62527;
            padding-bottom: 12px;
        }
        .section {
            background: #f1f5f9;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
            color: #334155;
            font-size: 14px;
        }
        .flex-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        select, textarea, input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            -webkit-appearance: none;
        }
        textarea {
            resize: vertical;
            font-family: inherit;
            background-color: #e2e8f0; 
            line-height: 1.6;
            font-size: 13px;
        }
        #dynamic-inputs-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .dynamic-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #ffffff;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }
        .dynamic-group label {
            font-size: 13px;
            color: #1e293b;
            margin-bottom: 0;
            width: 85px;
            flex-shrink: 0;
        }
        .preview-box {
            background-color: #fff5f5;
            border-left: 4px solid #d62527;
            padding: 12px;
            margin-top: 15px;
            border-radius: 6px;
            min-height: 50px;
            font-size: 14px;
            line-height: 1.6;
            color: #1e293b;
            word-break: break-all;
            white-space: pre-wrap;
        }
        .btn-flex {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        button {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 700;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary { background-color: #3b82f6; color: white; flex: 1; }
        .btn-success { background-color: #10b981; color: white; flex: 1; }
        .btn-lock { background-color: #64748b; color: white; }
        .btn-edit { background-color: #475569; color: white; padding: 10px; font-size: 12px; white-space: nowrap; }
        .btn-del { background-color: #ef4444; color: white; padding: 10px; font-size: 12px; white-space: nowrap; }
        
        .audio-controls {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-play { background-color: #d62527; color: white; font-size: 16px; padding: 14px; }
        .btn-pause { background-color: #f59e0b; color: white; font-size: 16px; padding: 14px; }
        
        button:active { opacity: 0.8; }
        .management-block {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>✈️ t'way AI 안내 방송</h2>
    
    <!-- 1. 방송 선택 -->
    <div class="section">
        <label>1. 방송 선택</label>
        <div class="flex-group">
            <select id="status" onchange="loadTemplate()" style="flex: 1.5;"></select>
            <select id="language" onchange="loadTemplate()" style="flex: 1.2;"></select>
        </div>

        <!-- 관리 마스터 패널 -->
        <div id="master-management-panel" style="display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #cbd5e1;">
            <div class="management-block">
                <label style="font-size: 12px; color: #d62527;">🛠️ 왼쪽 방송 항목 관리</label>
                <div class="flex-group" style="margin-bottom: 6px;">
                    <input type="text" id="newStatusInput" placeholder="새 항목 이름 추가">
                    <button class="btn-success" style="font-size:12px; padding:10px;" onclick="addStatusItem()">➕ 추가</button>
                </div>
                <div class="flex-group">
                    <input type="text" id="renameStatusInput" placeholder="선택 항목 이름 수정">
                    <button class="btn-edit" onclick="renameStatusItem()">✏️ 수정</button>
                    <button class="btn-del" onclick="deleteStatusItem()">❌ 삭제</button>
                </div>
            </div>

            <div class="management-block" style="margin-top: 10px;">
                <label style="font-size: 12px; color: #3b82f6;">🛠️ 오른쪽 언어 항목 관리</label>
                <div class="flex-group" style="margin-bottom: 6px;">
                    <input type="text" id="newLangInput" placeholder="새 언어 이름 추가">
                    <button class="btn-success" style="font-size:12px; padding:10px;" onclick="addLangItem()">➕ 추가</button>
                </div>
                <div class="flex-group">
                    <input type="text" id="renameLangInput" placeholder="선택 언어 이름 수정">
                    <button class="btn-edit" onclick="renameLangItem()">✏️ 수정</button>
                    <button class="btn-del" onclick="deleteLangItem()">❌ 삭제</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 🔊 [핵심 패치] 내장 성우를 직접 바꿀 수 있는 오디오 제어 섹션 -->
    <div class="section">
        <label>🎙️ 언어별 AI 성우 선택 (마음에 드는 목소리로 직접 변경)</label>
        <div style="margin-bottom: 8px;">
            <span style="font-size: 12px; font-weight: bold; color: #555;">🇯🇵 일본어 성우 목록:</span>
            <select id="voiceSelectJA" onchange="saveSelectedVoices()"></select>
        </div>
        <div>
            <span style="font-size: 12px; font-weight: bold; color: #555;">🇰🇷 한국어 성우 목록:</span>
            <select id="voiceSelectKO" onchange="saveSelectedVoices()"></select>
        </div>
    </div>

    <!-- 2. 방송문 -->
    <div class="section">
        <label id="templateLabel">2. 방송문</label>
        
        <div class="flex-group">
            <input type="password" id="passwordInput" placeholder="비밀번호 입력" style="flex: 1.2;">
            <button class="btn-primary" onclick="unlockTemplate()">🔓 해제</button>
            <button class="btn-lock" onclick="lockTemplate()">🔒 잠금</button>
        </div>

        <textarea id="templateInput" rows="12" readonly disabled oninput="renderDynamicInputs()"></textarea>
        
        <div class="btn-flex" id="save-control-group" style="display: none;">
            <button class="btn-success" onclick="saveTemplate()">💾 현재 조합에 저장</button>
            <button class="btn-lock" onclick="resetDefaultTemplate()">🔄 초기화</button>
        </div>
    </div>

    <!-- 3. 공란 입력 -->
    <div class="section" id="dynamic-section" style="display:none;">
        <label>3. 공란 입력</label>
        <div id="dynamic-inputs-container"></div>
    </div>

    <!-- 최종 방송문 미리보기 -->
    <label>📢 최종 완성 방송문 미리보기</label>
    <div class="preview-box" id="scriptPreview"></div>

    <!-- 4. 오디오 컨트롤 -->
    <div class="audio-controls">
        <button class="btn-play" onclick="playTTS()">🔊 방송 시작</button>
        <button class="btn-pause" id="pauseBtn" onclick="togglePause()">⏸️ 일시 정지</button>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "0501";
    let isPaused = false;
    let currentSentenceIndex = 0;
    let speechParts = [];
    let browserVoices = [];

    const initialStatusList = [
        { id: "status_1", name: "우선탑승 (Pre-boarding)" },
        { id: "status_2", name: "탑승중 (Boarding)" },
        { id: "status_3", name: "탑승마감 (Final Call)" }
    ];

    const initialLangList = [
        { id: "lang_1", name: "종합 방송" },
        { id: "lang_2", name: "한국어 전용" },
        { id: "lang_3", name: "영어 전용" }
    ];

    const defaultTemplates = {
        "status_1_lang_1": `더 멋진 변화의 시작, 티웨이항공에서 안내 말씀드리겠습니다. 잠시 후 티웨이항공 [편명] 편 [목적지]행 항공기의 탑승이 시작될 예정입니다. 원활하고 신속한 탑승을 위하여 몸이 불편하신 손님 및 유아를 동반하신 손님, 플래티넘 손님께서 먼저 탑승을 준비하여 주시기 바랍니다. 감사합니다.\n\nYour attention please. T’way Air flight (편명) bound for (목적지) is now ready for boarding. For efficient boarding, we will invite passengers who need special assistance, or are traveling with infants, business saver, t’way plus Platinum to board first. Thank you.\n\nT’way 航空よりご案内申し上げます。まもなくT’way 航空（편명）便（목적지）行きのご搭乗を開始させて頂きます。まず始めに、体の具合が悪いお客様およびお子様連れのお客様より機内へのご案内をさせて頂きますので、搭乗券をお持ちになって、搭乗口前にお越しください。`
    };

    const translationDic = {
        "오사카": { en: "Osaka", ja: "大阪", zh: "大阪" },
        "후쿠오카": { en: "Fukuoka", ja: "福岡", zh: "福冈" },
        "나리타": { en: "Narita", ja: "成田", zh: "成田" },
        "삿포로": { en: "Sapporo", ja: "札幌", zh: "扎幌" },
        "나트랑": { en: "Nha Trang", ja: "ニャチャン", zh: "芽庄" },
        "홍콩": { en: "Hong Kong", ja: "香港", zh: "香港" },
        "가오슝": { en: "Kaohsiung", ja: "高雄", zh: "高雄" }
    };

    window.onload = function() {
        loadVoices();
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = function() {
                loadVoices();
                populateVoiceSelectors();
            };
        }
        initSelectBoxes(); 
        loadTemplate();
    };

    function loadVoices() {
        browserVoices = window.speechSynthesis.getVoices();
        populateVoiceSelectors();
    }

    // 장치 내 탑재된 일본어/한국어 성우 목록을 드롭다운에 채워넣는 로직
    function populateVoiceSelectors() {
        const jaSelect = document.getElementById('voiceSelectJA');
        const koSelect = document.getElementById('voiceSelectKO');
        if (!jaSelect || browserVoices.length === 0) return;

        const currentJaSaved = localStorage.getItem('tway_saved_voice_ja');
        const currentKoSaved = localStorage.getItem('tway_saved_voice_ko');

        jaSelect.innerHTML = "";
        koSelect.innerHTML = "";

        browserVoices.forEach(voice => {
            if (voice.lang.startsWith('ja')) {
                const opt = document.createElement('option');
                opt.value = voice.name;
                opt.text = `${voice.name} (${voice.lang})`;
                if (voice.name === currentJaSaved) opt.selected = true;
                jaSelect.appendChild(opt);
            }
            if (voice.lang.startsWith('ko')) {
                const opt = document.createElement('option');
                opt.value = voice.name;
                opt.text = `${voice.name} (${voice.lang})`;
                if (voice.name === currentKoSaved) opt.selected = true;
                koSelect.appendChild(opt);
            }
        });
    }

    function saveSelectedVoices() {
        localStorage.setItem('tway_saved_voice_ja', document.getElementById('voiceSelectJA').value);
        localStorage.setItem('tway_saved_voice_ko', document.getElementById('voiceSelectKO').value);
    }

    function initSelectBoxes() {
        if (!localStorage.getItem('tw_master_status')) {
            localStorage.setItem('tw_master_status', JSON.stringify(initialStatusList));
        }
        if (!localStorage.getItem('tw_master_lang')) {
            localStorage.setItem('tw_master_lang', JSON.stringify(initialLangList));
        }
        renderSelectOptions();
    }

    function renderSelectOptions() {
        const statusSelect = document.getElementById('status');
        const langSelect = document.getElementById('language');
        
        const currentStatusVal = statusSelect.value;
        const currentLangVal = langSelect.value;

        const statusList = JSON.parse(localStorage.getItem('tw_master_status'));
        const langList = JSON.parse(localStorage.getItem('tw_master_lang'));

        statusSelect.innerHTML = "";
        statusList.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.id; opt.text = item.name;
            statusSelect.appendChild(opt);
        });

        langSelect.innerHTML = "";
        langList.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.id; opt.text = item.name;
            langSelect.appendChild(opt);
        });

        if (currentStatusVal && statusSelect.querySelector(`option[value="${currentStatusVal}"]`)) {
            statusSelect.value = currentStatusVal;
        }
        if (currentLangVal && langSelect.querySelector(`option[value="${currentLangVal}"]`)) {
            langSelect.value = currentLangVal;
        }
    }

    function addStatusItem() {
        const name = document.getElementById('newStatusInput').value.trim();
        if (!name) return alert("이름을 입력하세요.");
        const list = JSON.parse(localStorage.getItem('tw_master_status'));
        const newId = "status_" + Date.now();
        list.push({ id: newId, name: name });
        localStorage.setItem('tw_master_status', JSON.stringify(list));
        document.getElementById('newStatusInput').value = "";
        renderSelectOptions();
        document.getElementById('status').value = newId;
        loadTemplate();
    }

    function renameStatusItem() {
        const select = document.getElementById('status');
        const targetId = select.value;
        const newName = document.getElementById('renameStatusInput').value.trim();
        if (!newName) return alert("이름을 입력하세요.");
        const list = JSON.parse(localStorage.getItem('tw_master_status'));
        const item = list.find(i => i.id === targetId);
        if (item) item.name = newName;
        localStorage.setItem('tw_master_status', JSON.stringify(list));
        renderSelectOptions();
        loadTemplate();
    }

    function deleteStatusItem() {
        const select = document.getElementById('status');
        const targetId = select.value;
        const list = JSON.parse(localStorage.getItem('tw_master_status'));
        if (list.length <= 1) return alert("최소 한 개는 있어야 합니다.");
        if (!confirm("정말 삭제하시겠습니까?")) return;
        const newList = list.filter(i => i.id !== targetId);
        localStorage.setItem('tw_master_status', JSON.stringify(newList));
        renderSelectOptions();
        loadTemplate();
    }

    function addLangItem() {
        const name = document.getElementById('newLangInput').value.trim();
        if (!name) return alert("이름을 입력하세요.");
        const list = JSON.parse(localStorage.getItem('tw_master_lang'));
        const newId = "lang_" + Date.now();
        list.push({ id: newId, name: name });
        localStorage.setItem('tw_master_lang', JSON.stringify(list));
        document.getElementById('newLangInput').value = "";
        renderSelectOptions();
        document.getElementById('language').value = newId;
        loadTemplate();
    }

    function renameLangItem() {
        const select = document.getElementById('language');
        const targetId = select.value;
        const newName = document.getElementById('renameLangInput').value.trim();
        if (!newName) return alert("이름을 입력하세요.");
        const list = JSON.parse(localStorage.getItem('tw_master_lang'));
        const item = list.find(i => i.id === targetId);
        if (item) item.name = newName;
        localStorage.setItem('tw_master_lang', JSON.stringify(list));
        renderSelectOptions();
        loadTemplate();
    }

    function deleteLangItem() {
        const select = document.getElementById('language');
        const targetId = select.value;
        const list = JSON.parse(localStorage.getItem('tw_master_lang'));
        if (list.length <= 1) return alert("최소 한 개는 있어야 합니다.");
        if (!confirm("정말 삭제하시겠습니까?")) return;
        const newList = list.filter(i => i.id !== targetId);
        localStorage.setItem('tw_master_lang', JSON.stringify(newList));
        renderSelectOptions();
        loadTemplate();
    }

    function getStorageKey() {
        return `tway_final_${document.getElementById('status').value}_${document.getElementById('language').value}`;
    }

    function loadTemplate() {
        const statusSelect = document.getElementById('status');
        const langSelect = document.getElementById('language');
        if(!statusSelect.options.length || !langSelect.options.length) return;

        const currentStatusName = statusSelect.options[statusSelect.selectedIndex].text;
        const currentLangName = langSelect.options[langSelect.selectedIndex].text;
        
        document.getElementById('templateLabel').innerText = `2. 방송문 [ ${currentStatusName} > ${currentLangName} ]`;
        document.getElementById('renameStatusInput').value = currentStatusName;
        document.getElementById('renameLangInput').value = currentLangName;

        const key = getStorageKey();
        const savedData = localStorage.getItem(key);
        
        if (savedData) {
            document.getElementById('templateInput').value = savedData;
        } else {
            const combo = `${statusSelect.value}_${langSelect.value}`;
            document.getElementById('templateInput').value = defaultTemplates[combo] || `더 멋진 변화의 시작, 티웨이항공 안내 방송입니다.\n[편명] 및 [목적지] 내용을 입력하세요.`;
        }
        
        const isUnlocked = !document.getElementById('templateInput').readOnly;
        document.getElementById('master-management-panel').style.display = isUnlocked ? "block" : "none";

        stopTTSComplete();
        renderDynamicInputs();
    }

    function saveTemplate() {
        localStorage.setItem(getStorageKey(), document.getElementById('templateInput').value);
        alert(`💾 저장되었습니다.`);
        lockTemplate();
    }

    function unlockTemplate() {
        if(document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
            const ti = document.getElementById('templateInput');
            ti.readOnly = false; ti.disabled = false;
            ti.style.backgroundColor = "#ffffff";
            document.getElementById('save-control-group').style.display = "flex";
            document.getElementById('master-management-panel').style.display = "block"; 
        } else {
            alert("❌ 비밀번호가 올바르지 않습니다.");
        }
    }

    function lockTemplate() {
        const ti = document.getElementById('templateInput');
        ti.readOnly = true; ti.disabled = true;
        ti.style.backgroundColor = "#f1f5f9";
        document.getElementById('save-control-group').style.display = "none";
        document.getElementById('master-management-panel').style.display = "none"; 
        document.getElementById('passwordInput').value = "";
    }

    function resetDefaultTemplate() {
        if(confirm("기본 양식으로 복원하시겠습니까?")) {
            localStorage.removeItem(getStorageKey());
            loadTemplate();
        }
    }

    function renderDynamicInputs() {
        const container = document.getElementById('dynamic-inputs-container');
        const oldFlight = document.getElementById('flight_val')?.value || 'TW123';
        const oldDest = document.getElementById('dest_val')?.value || '오사카';

        container.innerHTML = `
            <div class="dynamic-group">
                <label>✈️ 비행 편명</label>
                <input type="text" id="flight_val" value="${oldFlight}" oninput="composeFinalScript()">
            </div>
            <div class="dynamic-group">
                <label>📍 목적 도시</label>
                <input type="text" id="dest_val" value="${oldDest}" oninput="composeFinalScript()">
            </div>
        `;
        document.getElementById('dynamic-section').style.display = 'block';
        composeFinalScript();
    }

    function composeFinalScript() {
        let template = document.getElementById('templateInput').value;
        const flight = document.getElementById('flight_val').value || '___';
        const destKo = document.getElementById('dest_val').value || '___';

        let destEn = destKo, destJa = destKo, destZh = destKo;
        if (translationDic[destKo]) {
            destEn = translationDic[destKo].en;
            destJa = translationDic[destKo].ja;
            destZh = translationDic[destKo].zh;
        }

        template = template.replace(/\[편명\]/g, flight).replace(/\[목적지\]/g, destKo);
        template = template.replace(/\(편명\)/g, flight).replace(/\(목적지\)/g, destEn);
        template = template.replace(/（편명）/g, flight).replace(/（목적지）/g, destJa);
        template = template.replace(/\{편명\}/g, flight).replace(/\{목적지\}/g, destZh);

        document.getElementById('scriptPreview').innerText = template;
    }

    function playTTS() {
        stopTTSComplete();
        const fullText = document.getElementById('scriptPreview').innerText;
        const lines = fullText.split('\n');
        speechParts = [];

        lines.forEach(line => {
            if(!line.trim()) return;

            const sentences = line.split(/([.!?])/);
            let accum = "";

            sentences.forEach(part => {
                if(!part) return;
                if(/^[.!?]$/.test(part)) {
                    if(accum.trim().length > 1) {
                        const targetText = accum.trim() + part;
                        const detectedLang = detectLanguageAuto(targetText);
                        
                        speechParts.push({
                            text: targetText,
                            lang: detectedLang,
                            pauseAfter: 800
                        });
                        accum = "";
                    }
                } else {
                    accum += part;
                }
            });
            if(accum.trim().length > 1) {
                const detectedLang = detectLanguageAuto(accum);
                speechParts.push({ text: accum.trim(), lang: detectedLang, pauseAfter: 1200 });
            }
        });

        if(speechParts.length === 0) return;

        currentSentenceIndex = 0;
        isPaused = false;
        executeQueue();
    }

    function detectLanguageAuto(text) {
        if (/[가-힣]/.test(text)) return 'ko-KR'; 
        if (/[ぁ-んァ-ン]/.test(text)) return 'ja-JP'; 
        if (/[𠮷𦥯一-龥]/.test(text) && !/[가-힣]/.test(text)) return 'zh-CN'; 
        if (/[A-Za-z]/.test(text)) return 'en-US'; 
        return 'ko-KR'; 
    }

    function executeQueue() {
        if (isPaused) return;
        if (currentSentenceIndex >= speechParts.length) {
            resetPauseButton();
            return;
        }

        const currentItem = speechParts[currentSentenceIndex];
        window.speechSynthesis.cancel(); 

        const utterance = new SpeechSynthesisUtterance(currentItem.text);
        utterance.lang = currentItem.lang;

        // 🔴 [사용자 선택 성우 매칭 엔진으로 교체]
        const selectedJaName = document.getElementById('voiceSelectJA').value;
        const selectedKoName = document.getElementById('voiceSelectKO').value;

        let targetVoice = null;
        
        if (currentItem.lang === 'ko-KR' && selectedKoName) {
            targetVoice = browserVoices.find(v => v.name === selectedKoName);
        } else if (currentItem.lang === 'ja-JP' && selectedJaName) {
            targetVoice = browserVoices.find(v => v.name === selectedJaName);
        } else {
            targetVoice = browserVoices.find(v => v.lang.startsWith(currentItem.lang.split('-')[0]));
        }
        
        if (targetVoice) utterance.voice = targetVoice;

        // 호흡 안정선 튜닝
        utterance.rate = 0.88;  
        utterance.pitch = 1.00; 

        utterance.onend = function() {
            currentSentenceIndex++;
            if (!isPaused && currentSentenceIndex < speechParts.length) {
                setTimeout(executeQueue, currentItem.pauseAfter);
            } else if (currentSentenceIndex >= speechParts.length) {
                resetPauseButton();
            }
        };

        utterance.onerror = function() {
            if (!isPaused) {
                currentSentenceIndex++;
                executeQueue();
            }
        };

        window.speechSynthesis.speak(utterance);
    }

    function togglePause() {
        const btn = document.getElementById('pauseBtn');
        if (!isPaused) {
            isPaused = true;
            window.speechSynthesis.cancel(); 
            btn.innerText = "▶️ 방송 재개";
            btn.style.backgroundColor = "#10b981";
        } else {
            isPaused = false;
            btn.innerText = "⏸️ 일시 정지";
            btn.style.backgroundColor = "#f59e0b";
            executeQueue(); 
        }
    }

    function stopTTSComplete() {
        window.speechSynthesis.cancel();
        isPaused = false;
        currentSentenceIndex = 0;
        resetPauseButton();
    }

    function resetPauseButton() {
        isPaused = false;
        const btn = document.getElementById('pauseBtn');
        btn.innerText = "⏸️ 일시 정지";
        btn.style.backgroundColor = "#f59e0b";
    }
</script>
